# .maestro/02_explore.yaml
# Tests: Explore tab — listing cards appear
appId: com.sharenest.app
---
- launchApp

# Navigate to explore
- tapOn: "Explorar"
- waitForAnimationToEnd

# Listings should be visible
- assertVisible: "€"
- assertVisible: "📍"

# Tap a listing card
- tapOn:
    index: 0
    id: "listing-card"

# Detail screen
- assertVisible: "Solicitar habitación"
- pressBack

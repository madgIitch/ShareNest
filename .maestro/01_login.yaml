# .maestro/01_login.yaml
# Tests: Login flow
appId: com.sharenest.app
---
- launchApp:
    clearState: true

# Should land on login screen
- assertVisible: "ShareNest"
- assertVisible: "Iniciar sesión"

- tapOn: "Correo electrónico"
- inputText: "test@sharenest.app"

- tapOn: "Contraseña"
- inputText: "testpassword123"

- tapOn: "Iniciar sesión"

# Should navigate to explore after login
- assertVisible:
    text: "Explorar"
    retryTapIfNoChange: true
    waitToSettleTimeoutMs: 5000

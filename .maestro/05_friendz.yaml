# .maestro/05_friendz.yaml
# Tests: Friendz tab — search works
appId: com.sharenest.app
---
- launchApp

- tapOn: "👥"
- waitForAnimationToEnd

- assertVisible: "Mis friendz"

# Switch to search tab
- tapOn: "Buscar"
- assertVisible: "Buscar usuarios"

- tapOn: "Buscar usuarios"
- inputText: "te"

- waitForAnimationToEnd

# Results should appear (or empty state)
- assertTrue:
    condition: ${visible("Sin resultados") || visible("Añadir friendz")}
